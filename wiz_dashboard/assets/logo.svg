<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 28" width="124" height="28" role="img" aria-label="Wiz Sidekick">
  <!-- Mark: three descending rules, echoing the severity-breakdown bars (the product's
       signature). Neutral ink only; no rationed color is spent on chrome. -->
  <g fill="#171717">
    <rect x="0" y="8"    width="18" height="3" rx="1.5"/>
    <rect x="0" y="12.5" width="13" height="3" rx="1.5" fill-opacity="0.6"/>
    <rect x="0" y="17"   width="8"  height="3" rx="1.5" fill-opacity="0.38"/>
  </g>
  <text x="30" y="19"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="600" letter-spacing="-0.3" fill="#171717">Wiz Sidekick</text>
</svg>
