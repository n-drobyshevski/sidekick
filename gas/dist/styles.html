<style>
/* Wiz Sidekick OS — the DESIGN.md visual system ("The Audit Ledger") ported to the GAS
   web app. Light theme only; neutral field; saturated color rationed to severity,
   state, and SLA verdicts. Two-token severity rule: --sev-* fills for marks/dots,
   --sev-*-text for any colored label. */

:root {
  --rail-w: 232px;
  --accent: #2563eb;
  --ink: #171717;
  --graphite: #0a0a0a;
  --graphite-hover: #27272a;
  --on-graphite: #fafafa;
  --page: #ffffff;
  --surface: #f8f8fa;
  --hairline: #e6e6e9;
  --text-2: rgba(0, 0, 0, 0.65);
  /* Tertiary text: 0.6 alpha clears WCAG AA (~5.4:1 on the surface tint) for the 11-13px
     labels, captions, and sub-values it carries. 0.5 resolved to ~3.95:1 and failed. */
  --text-3: rgba(0, 0, 0, 0.6);

  --sev-critical: #dc2626;  --sev-critical-text: #b91c1c;
  --sev-high: #ea580c;      --sev-high-text: #c2410c;
  --sev-medium: #d97706;    --sev-medium-text: #b45309;
  --sev-low: #2563eb;       --sev-low-text: #1d4ed8;
  --sev-info: #64748b;      --sev-info-text: #475569;
  --sev-unknown: #475569;   --sev-unknown-text: #334155;

  /* Categorical hues for the grouping charts (pie + group trend). charts.js CATEGORICAL is
     the copy the canvas actually consumes (canvas can't read CSS vars); these mirror it and
     are kept in sync by convention. Chosen outside the severity band above so a group is
     never mistaken for a severity; --cat-other is the neutral "everything else" bucket. */
  --cat-1: #2563eb;  --cat-2: #0d9488;  --cat-3: #c026d3;  --cat-4: #4d7c0f;
  --cat-5: #7c3aed;  --cat-6: #0891b2;  --cat-7: #db2777;  --cat-8: #9333ea;
  --cat-other: #94a3b8;

  --ok: #15803d;
  --warn: #a16207;
  --bad: #b91c1c;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  /* Semantic z-index scale. The route-overlay outranks transient popovers so a reload
     veil reliably absorbs clicks even over an open menu; sheets and toasts sit above it. */
  --z-popover: 30;
  --z-overlay: 40;
  --z-topbar: 45; /* mobile top-bar: above the route overlay, below sheets/toasts */
  --z-scrim: 50;
  --z-sheet: 51;
  --z-toast: 60;

  --shadow-card: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-button: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sheet: -8px 0 24px -8px rgba(0, 0, 0, 0.18), -2px 0 8px -4px rgba(0, 0, 0, 0.1);

  --font: -apple-system, BlinkMacSystemFont, Inter, "Segoe UI", Roboto, "Helvetica Neue",
    sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--page);
  color: var(--ink);
  font-family: var(--font);
  font-size: 0.875rem;
  line-height: 1.5;
  font-feature-settings: "cv02", "cv03", "cv04", "cv11";
}

/* ------------------------------------------------------------------ shell / nav */
/* Fixed viewport-height shell: the rail always fills the viewport (pinning the scan
   zone to the bottom) and the content pane scrolls on its own. */
#app { display: flex; height: 100vh; overflow: hidden; position: relative; }

.sidebar {
  width: var(--rail-w);
  flex: 0 0 var(--rail-w);
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1px solid var(--hairline);
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sidebar .wordmark {
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: -0.02em;
  padding: 4px 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wordmark-dot {
  width: 10px; height: 10px; border-radius: 3px; background: var(--accent);
  display: inline-block;
}
.nav-group {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 12px 10px 4px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: var(--radius-md);
  color: var(--ink);
  font-size: 13px;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
}
.nav-link:hover { background: rgba(0, 0, 0, 0.045); }
/* Active nav reads by position + weight, not a ~2.5% tint alone: a 2px accent rail anchors
   "you are here". Inset shadow keeps color rationing intact (accent = focus/data). */
.nav-link.active {
  background: rgba(0, 0, 0, 0.07);
  font-weight: 600;
  box-shadow: inset 2px 0 0 var(--accent);
}
.nav-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.sidebar .scan-zone {
  margin-top: auto;
  border-top: 1px solid var(--hairline);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scan-caption { font-size: 12px; color: var(--text-2); }
.scan-controls { display: flex; flex-direction: column; gap: 8px; }
.scan-buttons { display: flex; gap: 8px; }

/* Global Value Chain filter — sits at the top of the bottom cluster. The select
   spans the rail so long chain names don't clip. */
.sidebar-filter select { width: 100%; }

/* Collapsible rail — icon-only mode (desktop only; the <=800px top-bar layout further
   down ignores .collapsed). Width rides --rail-w so the flex main pane and the reload
   overlay's left edge follow automatically; only the width transitions. */
.sidebar { transition: flex-basis 0.18s ease, width 0.18s ease; }
.nav-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; flex: 0 0 18px; color: var(--text-2);
}
.nav-icon svg { width: 18px; height: 18px; display: block; }
.nav-link.active .nav-icon { color: var(--ink); }
.wordmark-label { flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
.rail-toggle {
  margin-left: auto; flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; padding: 0;
  border: 1px solid var(--hairline); border-radius: var(--radius-md);
  background: var(--page); color: var(--text-2); cursor: pointer;
}
.rail-toggle:hover { background: rgba(0, 0, 0, 0.045); }
.rail-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.rail-toggle svg { width: 16px; height: 16px; display: block; transition: transform 0.18s ease; }
.sidebar .scan-buttons button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.sidebar .scan-buttons .primary .nav-icon { color: inherit; width: 16px; height: 16px; flex-basis: 16px; }
.sidebar .scan-buttons .primary .nav-icon svg { width: 16px; height: 16px; }
.rail-status-dot { display: none; width: 9px; height: 9px; border-radius: 50%; align-self: center; }
.rail-status-dot.ok { background: var(--ok); }
.rail-status-dot.neutral { background: var(--text-3); }

@media (min-width: 801px) {
  .sidebar.collapsed { padding-left: 8px; padding-right: 8px; }
  .sidebar.collapsed .wordmark-label,
  .sidebar.collapsed .wordmark-dot,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .nav-group,
  .sidebar.collapsed .sidebar-filter,
  .sidebar.collapsed .scan-caption,
  .sidebar.collapsed .btn-label,
  .sidebar.collapsed .scan-buttons button:not(.primary) { display: none; }
  .sidebar.collapsed .wordmark { justify-content: center; padding: 4px 0 14px; }
  .sidebar.collapsed .rail-toggle { margin-left: 0; }
  .sidebar.collapsed .rail-toggle svg { transform: rotate(180deg); }
  .sidebar.collapsed .nav-link { justify-content: center; padding: 8px 0; }
  .sidebar.collapsed .scan-buttons { justify-content: center; }
  .sidebar.collapsed .scan-buttons .primary { padding: 8px; }
  .sidebar.collapsed .rail-status-dot { display: block; }
}
/* The rail becomes a horizontal wrapping top-bar here, so icon-collapse doesn't apply. */
@media (max-width: 800px) { .rail-toggle { display: none; } }
@media (prefers-reduced-motion: reduce) {
  .sidebar, .rail-toggle svg { transition: none; }
}

/* Scan progress card (persistent, non-modal; lives in the scan zone while a job runs) */
.scan-progress {
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding: 10px 12px;
  background: var(--page);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}
.scan-progress-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.scan-progress-phase { font-size: 13px; font-weight: 600; color: var(--ink); }
.scan-progress-elapsed { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.scan-progress-counts { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }
.scan-progress.failed .scan-progress-counts { color: var(--bad); }
/* A run with no progress for minutes: flag it amber on the always-visible card, not only
   behind the details drawer, so a likely-dead scan is legible at a glance. */
.scan-progress.stuck { border-color: rgba(161, 98, 7, 0.4); }
.scan-progress.stuck .scan-progress-phase,
.scan-progress.stuck .scan-progress-counts { color: var(--warn); }
.scan-progress-actions { display: flex; gap: 12px; }
.linklike {
  background: none; border: none; padding: 0; font-size: 12px; font-weight: 600;
  color: var(--accent); cursor: pointer;
}
.linklike.danger { color: var(--bad); }
.linklike:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

/* Track/fill progress bar. Fill is Signal Blue — the data color. */
.progress-track {
  position: relative;
  height: 8px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.07);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--accent);
  transition: width 300ms ease-out;
}
.progress-track.done .progress-fill { background: var(--ok); }
.progress-track.failed .progress-fill { background: var(--bad); }
.progress-track.cancelled .progress-fill { background: var(--text-3); }
/* Indeterminate: a travelling band. Under reduced motion the band is replaced by a
   calm static striped fill so "working" still reads without animation. */
.progress-track.indeterminate .progress-fill {
  width: 40%;
  animation: progress-indeterminate 1.4s ease-in-out infinite;
}
@keyframes progress-indeterminate {
  0% { margin-left: -40%; }
  100% { margin-left: 100%; }
}
@media (prefers-reduced-motion: reduce) {
  .progress-track.indeterminate .progress-fill {
    width: 100%;
    margin-left: 0;
    background: repeating-linear-gradient(
      45deg, var(--accent), var(--accent) 8px,
      color-mix(in srgb, var(--accent) 55%, white) 8px,
      color-mix(in srgb, var(--accent) 55%, white) 16px);
  }
}

/* Details drawer: phase stepper + fact grid */
.scan-steps { display: flex; gap: 14px; margin: 4px 0 14px; }
.scan-step { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-3); }
.scan-step.done { color: var(--ok); }
.scan-step.active { color: var(--accent); font-weight: 600; }
.scan-step-dot { font-size: 12px; }
.scan-detail-grid {
  display: grid; grid-template-columns: auto 1fr; gap: 6px 16px;
  margin-top: 14px; font-size: 13px;
}
.scan-detail-grid dt { color: var(--text-3); }
.scan-detail-grid dd { margin: 0; font-variant-numeric: tabular-nums; }
.scan-detail-error {
  margin-top: 14px; padding: 10px 12px; font-size: 13px;
  color: var(--bad); background: rgba(185, 28, 28, 0.06);
  border-radius: var(--radius-md);
}

main {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 28px 32px 48px;
  /* No max-width: main fills whatever the rail leaves, so collapsing the rail actually
     widens the content (charts add columns via their auto-fit grids) instead of just
     growing the right margin. */
}

/* Route-reload overlay: a translucent veil + indeterminate top bar over the content
   pane (the sidebar stays clear and interactive) while the active page refetches. */
.route-overlay {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  left: var(--rail-w);
  z-index: var(--z-overlay);
  display: flex;
  justify-content: center;
  background: color-mix(in srgb, var(--surface) 72%, transparent);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 140ms ease-out, visibility 0s linear 140ms;
}
.route-overlay.visible {
  opacity: 1;
  visibility: visible;
  pointer-events: auto; /* absorb clicks on stale content while it reloads */
  transition: opacity 140ms ease-out;
}
.route-overlay-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.06);
}
.route-overlay-fill {
  width: 40%;
  height: 100%;
  background: var(--accent);
  animation: progress-indeterminate 1.2s ease-in-out infinite;
}
.route-overlay-label {
  margin-top: 84px;
  align-self: flex-start;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  background: var(--page);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  padding: 5px 12px;
  box-shadow: var(--shadow-card);
}
.route-overlay-label:empty { display: none; }
@media (prefers-reduced-motion: reduce) {
  /* No travelling band under reduced motion — a calm static striped fill still
     reads as "working" (mirrors the scan progress bar's fallback). */
  .route-overlay-fill {
    width: 100%;
    animation: none;
    background: repeating-linear-gradient(
      45deg, var(--accent), var(--accent) 8px,
      color-mix(in srgb, var(--accent) 55%, white) 8px,
      color-mix(in srgb, var(--accent) 55%, white) 16px);
  }
  .route-overlay { transition: none; }
}

@media (max-width: 800px) {
  /* Top-bar layout: the rail stacks above the content and the page scrolls
     normally, so opt back out of the fixed viewport-height shell. */
  #app { flex-direction: column; height: auto; min-height: 100vh; overflow: visible; }
  .sidebar {
    width: auto;
    flex: none;
    height: auto;
    overflow: visible;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    border-right: none;
    border-bottom: 1px solid var(--hairline);
  }
  .sidebar .scan-zone { margin-top: 0; border-top: none; padding-top: 0; }
  /* The top bar must stay above the full-width route overlay so nav + scan controls remain
     visible and clickable during a reload (desktop clears the rail via left:var(--rail-w)). */
  .sidebar { position: relative; z-index: var(--z-topbar); }
  main { height: auto; overflow: visible; padding: 20px 16px 40px; }
  /* Sidebar is a top bar here, so the veil spans the full width. Pin it to the
     viewport since #app is no longer a fixed-height positioning frame. */
  .route-overlay { position: fixed; left: 0; }
}

/* ------------------------------------------------------------------- typography */
h1 { font-size: 1.5rem; font-weight: 600; line-height: 1.2; letter-spacing: -0.02em; margin: 0 0 4px; }
.page-sub { color: var(--text-2); margin: 0 0 20px; }
h2.section-label { font-size: 0.9375rem; font-weight: 600; margin: 28px 0 10px; }
/* A note that sits directly under a section label (structural, not a pixel nudge). */
.section-note { margin: -4px 0 12px; font-size: 12px; color: var(--text-2); }
h3 { font-size: 1rem; font-weight: 600; margin: 0 0 8px; }
.label {
  font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-3);
}
.num, .kpi-value, td.num, .hero-value, .mini-value { font-variant-numeric: tabular-nums; }
.muted { color: var(--text-2); }
.small { font-size: 12px; }

/* ---------------------------------------------------------------------- buttons */
button, .btn {
  font-family: inherit;
  font-size: 0.875rem;
  border-radius: var(--radius-md);
  min-height: 36px;
  padding: 6px 14px;
  cursor: pointer;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-button);
}
button:hover, .btn:hover { background: #f1f1f4; border-color: #d9d9de; }
button:focus-visible, .btn:focus-visible, a:focus-visible, input:focus-visible,
select:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
button.primary {
  background: var(--graphite);
  color: var(--on-graphite);
  border: none;
}
button.primary:hover { background: var(--graphite-hover); }
button.danger { color: var(--bad); border-color: rgba(185, 28, 28, 0.35); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.link {
  background: none; border: none; box-shadow: none; color: var(--accent);
  padding: 2px 4px; min-height: 0;
}

/* ----------------------------------------------------------------------- inputs */
input[type="text"], input[type="search"], input[type="number"], select {
  font-family: inherit;
  font-size: 0.875rem;
  background: var(--page);
  color: var(--ink);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  min-height: 36px;
  padding: 4px 10px;
}
label.field-label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 4px; }

/* Invalid input state — border + focus ring pair the color with the field position, and
   .field-error carries the plain-language reason in text (never color alone). */
input[aria-invalid="true"], select[aria-invalid="true"], textarea[aria-invalid="true"] {
  border-color: var(--bad);
}
input[aria-invalid="true"]:focus-visible, select[aria-invalid="true"]:focus-visible {
  outline-color: var(--bad);
}
.field-error { color: var(--bad); font-size: 12px; margin-top: 4px; }

/* ------------------------------------------------------------------------ cards */
.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-xl);
  padding: 16px;
  box-shadow: var(--shadow-card);
}
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 0 0 20px; }
.kpi-card { background: var(--surface); border: 1px solid var(--hairline); border-radius: var(--radius-xl); padding: 14px 16px; box-shadow: var(--shadow-card); }
.kpi-label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); }
.kpi-value { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-top: 2px; }
.kpi-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

/* -------------------------------------------------------------------- hero stat */
.hero { margin: 4px 0 24px; }
.hero .label { margin-bottom: 2px; }
.hero-value { font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; }
.hero-src { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.hero-minis {
  display: flex; flex-wrap: wrap; gap: 28px;
  border-top: 1px solid var(--hairline);
  margin-top: 14px; padding-top: 12px;
}
.mini-label { font-size: 12px; color: var(--text-3); }
.mini-value { font-size: 18px; font-weight: 600; }

/* Help explainer (how a headline metric is calculated). The wrapped metric itself is the
   hover/focus target — no separate glyph; the bubble is the neutral popover recipe (white /
   hairline / --shadow-card, like .sev-filter-menu). Revealed on hover/focus-within; the
   bubble stays in the DOM (opacity only) so aria-describedby text is announced. See ui.js
   helpTip(). */
.helptip { position: relative; }
/* Metric variant: shrink-to-content so only the metric area is the hover zone, not the row. */
.hero-metric { display: inline-block; cursor: help; }
/* Non-hero definition trigger: a chart title, table header, or stat-card row that's the
   term itself (not a separate "i" glyph or link) — cursor:help is the only affordance,
   matching .hero-metric's minimalism at inline/row scale instead of the 2rem hero. */
.help-label { cursor: help; }
.helptip-bubble {
  position: absolute; left: 0; top: calc(100% + 8px); z-index: var(--z-popover);
  width: max-content; max-width: 268px; padding: 10px;
  display: flex; flex-direction: column; gap: 5px;
  background: var(--page); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  font-size: 12px; font-weight: 400; line-height: 1.45;
  letter-spacing: 0; text-transform: none; text-align: left;
  white-space: normal; /* table headers set nowrap — the bubble must wrap, not overflow */
  opacity: 0; pointer-events: none; transform: translateY(-2px);
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.helptip-line { display: block; }
.helptip:hover > .helptip-bubble,
.helptip:focus-within > .helptip-bubble { opacity: 1; pointer-events: auto; transform: translateY(0); }
@media (prefers-reduced-motion: reduce) {
  .helptip-bubble { transition: none; transform: none; }
  .helptip:hover .helptip-bubble, .helptip:focus-within .helptip-bubble { transform: none; }
}

/* change chips */
.chg { font-size: 12px; font-weight: 600; border-radius: var(--radius-sm); padding: 1px 6px; margin-left: 6px; }
.chg.up { color: var(--bad); background: rgba(185, 28, 28, 0.12); }
.chg.down { color: var(--ok); background: rgba(21, 128, 61, 0.12); }
.chg.flat { color: var(--text-3); background: rgba(0, 0, 0, 0.06); }

/* --------------------------------------------------------------------- severity */
.sev-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
.sev-badge {
  display: inline-flex; align-items: center;
  border-radius: 999px; padding: 2px 9px;
  font-size: 12px; font-weight: 600;
}
.sev-CRITICAL { background: rgba(220, 38, 38, 0.14); color: var(--sev-critical-text); }
.sev-CRITICAL .sev-dot { background: var(--sev-critical); }
.sev-HIGH { background: rgba(234, 88, 12, 0.14); color: var(--sev-high-text); }
.sev-HIGH .sev-dot { background: var(--sev-high); }
.sev-MEDIUM { background: rgba(217, 119, 6, 0.14); color: var(--sev-medium-text); }
.sev-MEDIUM .sev-dot { background: var(--sev-medium); }
.sev-LOW { background: rgba(37, 99, 235, 0.14); color: var(--sev-low-text); }
.sev-LOW .sev-dot { background: var(--sev-low); }
.sev-INFO { background: rgba(100, 116, 139, 0.14); color: var(--sev-info-text); }
.sev-INFO .sev-dot { background: var(--sev-info); }
